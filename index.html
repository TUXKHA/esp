<button onclick="send('home/door/unlock','ON')">Unlock</button>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script>
const cam = document.getElementById("cam");
setInterval(() => {
  cam.src = "https://YOURNAME.onrender.com/latest.jpg?t=" + Date.now();
}, 500);

const client = mqtt.connect("wss://YOUR_HIVEMQ_URL:8884", {
  username: "YOUR_USER",
  password: "YOUR_PASS"
});

function send(topic, msg) {
  client.publish(topic, msg);
}
</script>
